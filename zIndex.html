<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container{
           height: 400px;
           width: 400px;
        }
        .box1 {
            position: absolute;
            background-color: red;
            top: 80px;
            left: 50px;
            z-index: -100;
             height: 150px;
            width: 150px;
            border: 1px solid black;
        }
        .box2 {
            position: absolute;
            background-color: blue;
            top: 300px;
            left: 140px;
            z-index: 10;
             height: 150px;
            width: 150px;
            border: 1px solid black;
            /* display: none; */
            /* visibility: hidden; */
        }
        .box3 {
            background-color: green;
             height: 150px;
            width: 150px;
            border: 1px solid black;
        }
        .box4 {
            background-color: yellow;
             height: 150px;
            width: 150px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    </div>
    <img alt="" src="">
</body>
</html>
